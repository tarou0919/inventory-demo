<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫管理デモ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f8f9fa;
  --ink: #1a1a2e;
  --accent: #2563eb;
  --success: #059669;
  --warning: #d97706;
  --danger: #dc2626;
  --muted: #6b7280;
  --border: #e5e7eb;
  --card: #ffffff;
  --success-bg: #dcfce7;
  --warning-bg: #fef3c7;
  --danger-bg: #fee2e2;
  --success-text: #065f46;
  --warning-text: #92400e;
  --danger-text: #991b1b;
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; line-height: 1.6; font-size: 15px; }

/* HEADER */
.header {
  background: var(--ink);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-title { color: #fff; font-size: 16px; font-weight: 700; }
.header-badge { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); font-size: 11px; padding: 3px 10px; border-radius: 100px; }

/* WELCOME */
.welcome {
  background: linear-gradient(135deg, #1a1a2e 0%, #2563eb 100%);
  color: #fff;
  padding: 40px 24px;
  text-align: center;
}
.welcome h1 { font-size: clamp(22px, 5vw, 32px); font-weight: 700; margin-bottom: 10px; }
.welcome p { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 28px; max-width: 500px; margin-left: auto; margin-right: auto; }
.industry-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.ind-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.2s;
}
.ind-btn:hover { background: rgba(255,255,255,0.25); }
.ind-btn.active { background: #fff; color: var(--accent); font-weight: 700; border-color: #fff; }

/* ALERT BANNER */
.alert-banner {
  display: none;
  background: var(--danger-bg);
  border-bottom: 2px solid #fca5a5;
  padding: 12px 24px;
  font-size: 14px;
  color: var(--danger-text);
  font-weight: 500;
  text-align: center;
}
.alert-banner.show { display: block; }

/* MAIN */
.main { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }

/* SECTION TITLE */
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
  margin-top: 28px;
}

/* SUMMARY */
.summary-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 8px; }
@media (min-width: 500px) { .summary-row { grid-template-columns: repeat(4, 1fr); } }
.sum-card { background: var(--card); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); text-align: center; }
.sum-card .num { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
.sum-card .lbl { font-size: 12px; color: var(--muted); }
.sum-card.red { background: var(--danger-bg); border-color: #fca5a5; }
.sum-card.red .num { color: var(--danger); }
.sum-card.yellow { background: var(--warning-bg); border-color: #fcd34d; }
.sum-card.yellow .num { color: var(--warning); }
.sum-card.green { background: var(--success-bg); border-color: #6ee7b7; }
.sum-card.green .num { color: var(--success); }

/* ITEM CARDS */
.items-grid { display: flex; flex-direction: column; gap: 10px; }
.item-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px 18px;
  transition: box-shadow 0.2s;
}
.item-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.item-card.status-danger { border-left: 4px solid var(--danger); }
.item-card.status-warning { border-left: 4px solid var(--warning); }
.item-card.status-ok { border-left: 4px solid var(--success); }

.item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.item-name { font-size: 16px; font-weight: 700; }
.item-badge { font-size: 12px; padding: 4px 12px; border-radius: 100px; font-weight: 500; }
.item-badge.danger { background: var(--danger-bg); color: var(--danger-text); }
.item-badge.warning { background: var(--warning-bg); color: var(--warning-text); }
.item-badge.success { background: var(--success-bg); color: var(--success-text); }

/* PROGRESS BAR */
.progress-wrap { margin-bottom: 10px; }
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.progress-bar-bg { background: #f3f4f6; border-radius: 100px; height: 10px; position: relative; overflow: visible; }
.progress-bar-fill { height: 10px; border-radius: 100px; transition: width 0.4s ease; }
.progress-marker {
  position: absolute;
  top: -3px;
  width: 2px;
  height: 16px;
  background: var(--danger);
  border-radius: 1px;
}
.progress-marker-label { position: absolute; top: 18px; font-size: 10px; color: var(--danger); transform: translateX(-50%); white-space: nowrap; }

.item-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.item-stock-info { font-size: 13px; color: var(--muted); }
.item-stock-info strong { color: var(--ink); font-size: 15px; }
.item-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.stock-direct { width: 72px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; text-align: center; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; color: var(--accent); transition: border-color 0.2s; }
.stock-direct:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

/* BUTTONS */
.btn { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; padding: 9px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--ink); cursor: pointer; transition: all 0.15s; font-weight: 500; }
.btn:hover { background: var(--bg); }
.btn:active { transform: scale(0.97); }
.btn-sm { font-size: 13px; padding: 6px 14px; border-radius: 6px; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4ed8; }
.btn-success { background: var(--success-bg); color: var(--success-text); border-color: #86efac; }
.btn-warning { background: var(--warning-bg); color: var(--warning-text); border-color: #fcd34d; }
.btn-danger { background: var(--danger-bg); color: var(--danger-text); border-color: #fca5a5; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--muted); font-size: 12px; padding: 4px 8px; }
.btn-ghost:hover { color: var(--danger); background: var(--danger-bg); }

.add-btn {
  width: 100%;
  padding: 14px;
  background: var(--card);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }

/* CHART */
.chart-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; margin-top: 8px; }
.chart-legend { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.chart-wrap { position: relative; height: 240px; }

/* QUICK ACTIONS */
.quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 8px; }
@media (min-width: 500px) { .quick-actions { grid-template-columns: repeat(4, 1fr); } }
.quick-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.quick-btn:hover { border-color: var(--accent); background: #eff6ff; transform: translateY(-2px); }
.quick-btn .icon { font-size: 24px; margin-bottom: 6px; }
.quick-btn .label { font-size: 12px; color: var(--muted); font-weight: 500; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; padding: 0; }
@media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } }
.overlay.open { display: flex; }
.modal {
  background: var(--card);
  width: 100%;
  max-width: 440px;
  border-radius: 20px 20px 0 0;
  padding: 24px 24px 36px;
  max-height: 85vh;
  overflow-y: auto;
}
@media (min-width: 600px) { .modal { border-radius: 16px; padding: 28px; } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 20px; }
@media (min-width: 600px) { .modal-handle { display: none; } }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field label { font-size: 13px; color: var(--muted); font-weight: 500; display: block; margin-bottom: 6px; }
.field input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  transition: border-color 0.2s;
}
.field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions .btn { flex: 1; padding: 12px; font-size: 15px; border-radius: 10px; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: #fff;
  font-size: 14px;
  padding: 12px 24px;
  border-radius: 100px;
  z-index: 999;
  transition: transform 0.3s ease;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 400px) {
  .item-actions { flex-wrap: wrap; }
  .stock-direct { width: 60px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-title">在庫管理デモ</div>
  <span class="header-badge">全業種対応</span>
</header>

<!-- WELCOME -->
<div class="welcome">
  <h1>在庫の「見える化」を<br>今日から始めよう</h1>
  <p>あなたの業種を選ぶと、サンプルデータで動作を確認できます</p>
  <div class="industry-btns">
    <button class="ind-btn active" onclick="switchIndustry('manufacturing',this)">🏭 製造業</button>
    <button class="ind-btn" onclick="switchIndustry('retail',this)">🛒 小売・EC</button>
    <button class="ind-btn" onclick="switchIndustry('food',this)">🍳 飲食業</button>
    <button class="ind-btn" onclick="switchIndustry('medical',this)">💊 医療・薬局</button>
  </div>
</div>

<!-- ALERT BANNER -->
<div class="alert-banner" id="alertBanner"></div>

<main class="main">

  <!-- STEP 1: 状況確認 -->
  <div class="section-title">現在の在庫状況</div>
  <div class="summary-row" id="summaryRow"></div>

  <!-- STEP 2: 品目一覧 -->
  <div class="section-title" style="margin-top:24px;">品目ごとの在庫</div>
  <div class="items-grid" id="itemsGrid"></div>
  <button class="add-btn" style="margin-top:10px;" onclick="openAdd()">＋ 新しい品目を追加する</button>

  <!-- STEP 3: グラフ -->
  <div class="section-title">グラフで確認</div>
  <div class="chart-card">
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2563eb;"></div>現在庫</div>
      <div class="legend-item"><div class="legend-dot" style="background:#dc2626;"></div>発注点</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d97706;"></div>上限</div>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <!-- STEP 4: クイックアクション -->
  <div class="section-title">よく使う操作</div>
  <div class="quick-actions">
    <div class="quick-btn" onclick="quickAction('low')">
      <div class="icon">⚠️</div>
      <div class="label">在庫切れを確認</div>
    </div>
    <div class="quick-btn" onclick="quickAction('order')">
      <div class="icon">📋</div>
      <div class="label">発注リストを見る</div>
    </div>
    <div class="quick-btn" onclick="quickAction('optimal')">
      <div class="icon">✅</div>
      <div class="label">全て適正にする</div>
    </div>
    <div class="quick-btn" onclick="quickAction('reset')">
      <div class="icon">🔄</div>
      <div class="label">リセット</div>
    </div>
  </div>

</main>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- 入荷モーダル -->
<div class="overlay" id="inModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="inTitle">入荷数を入力</div>
    <div class="field"><label>入荷数（個）</label><input type="number" id="inQty" min="1" value="50" /></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('inModal')">キャンセル</button>
      <button class="btn btn-success" onclick="confirmIn()">入荷する</button>
    </div>
  </div>
</div>

<!-- 出庫モーダル -->
<div class="overlay" id="outModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="outTitle">出庫数を入力</div>
    <div class="field"><label>出庫数（個）</label><input type="number" id="outQty" min="1" value="10" /></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('outModal')">キャンセル</button>
      <button class="btn btn-warning" onclick="confirmOut()">出庫する</button>
    </div>
  </div>
</div>

<!-- 品目追加モーダル -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">品目を追加する</div>
    <div class="field"><label>品目名</label><input type="text" id="addName" placeholder="例：商品A" /></div>
    <div class="field"><label>現在の在庫数</label><input type="number" id="addStock" min="0" value="100" /></div>
    <div class="field"><label>発注点（この数量を下回ったら警告）</label><input type="number" id="addReorder" min="0" value="30" /></div>
    <div class="field"><label>上限在庫（この数量を超えたら警告）</label><input type="number" id="addMax" min="0" value="200" /></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('addModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmAdd()">追加する</button>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="overlay" id="editModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="editTitle">品目の設定</div>
    <div class="field"><label>品目名</label><input type="text" id="editName" /></div>
    <div class="field"><label>現在庫数</label><input type="number" id="editStock" min="0" /></div>
    <div class="field">
      <label>発注点（この数量を下回ったら警告）</label>
      <input type="number" id="editReorder" min="0" />
    </div>
    <div class="field">
      <label>上限在庫（この数量を超えたら警告）</label>
      <input type="number" id="editMax" min="0" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('editModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmEdit()">保存する</button>
    </div>
  </div>
</div>

<!-- 発注リストモーダル -->
<div class="overlay" id="orderModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📋 発注が必要な品目</div>
    <div id="orderList"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1;" onclick="closeModal('orderModal')">閉じる</button>
    </div>
  </div>
</div>

<script>
const industryData = {
  manufacturing: {
    items: [
      { name: '部品A', stock: 45, reorder: 50, max: 200 },
      { name: '部品B', stock: 180, reorder: 40, max: 150 },
      { name: '原材料C', stock: 95, reorder: 30, max: 180 },
      { name: '部品D', stock: 20, reorder: 60, max: 160 },
      { name: '資材E', stock: 210, reorder: 50, max: 180 },
    ]
  },
  retail: {
    items: [
      { name: 'Tシャツ(S)', stock: 8, reorder: 10, max: 50 },
      { name: 'Tシャツ(M)', stock: 35, reorder: 10, max: 50 },
      { name: 'ジーンズ', stock: 55, reorder: 8, max: 40 },
      { name: 'スニーカー', stock: 5, reorder: 6, max: 30 },
      { name: 'バッグ', stock: 18, reorder: 5, max: 25 },
    ]
  },
  food: {
    items: [
      { name: '鶏もも肉(kg)', stock: 3, reorder: 5, max: 20 },
      { name: '玉ねぎ(kg)', stock: 12, reorder: 3, max: 15 },
      { name: '小麦粉(kg)', stock: 8, reorder: 4, max: 20 },
      { name: 'サラダ油(L)', stock: 6, reorder: 3, max: 15 },
      { name: 'ビール(本)', stock: 120, reorder: 24, max: 96 },
    ]
  },
  medical: {
    items: [
      { name: '解熱鎮痛剤', stock: 15, reorder: 20, max: 100 },
      { name: '消毒液(L)', stock: 8, reorder: 5, max: 30 },
      { name: 'マスク(箱)', stock: 45, reorder: 10, max: 50 },
      { name: '手袋(箱)', stock: 7, reorder: 10, max: 40 },
      { name: '点滴セット', stock: 12, reorder: 15, max: 60 },
    ]
  }
};

let items = JSON.parse(JSON.stringify(industryData.manufacturing.items));
let chart = null;
let inTarget = -1, outTarget = -1, editTarget = -1;

const getStatus = item => {
  if (item.stock <= item.reorder) return { label: '要発注', cls: 'danger', cardCls: 'status-danger' };
  if (item.stock >= item.max) return { label: '過剰', cls: 'warning', cardCls: 'status-warning' };
  return { label: '適正', cls: 'success', cardCls: 'status-ok' };
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function renderAlert() {
  const need = items.filter(i => i.stock <= i.reorder);
  const banner = document.getElementById('alertBanner');
  if (need.length) {
    banner.textContent = `⚠ 発注が必要な品目が ${need.length} 件あります：${need.map(i => i.name).join('、')}`;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

function renderSummary() {
  const danger = items.filter(i => i.stock <= i.reorder).length;
  const over = items.filter(i => i.stock >= i.max).length;
  const ok = items.filter(i => i.stock > i.reorder && i.stock < i.max).length;
  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-card"><div class="num">${items.length}</div><div class="lbl">管理品目</div></div>
    <div class="sum-card red"><div class="num">${danger}</div><div class="lbl">要発注</div></div>
    <div class="sum-card yellow"><div class="num">${over}</div><div class="lbl">過剰在庫</div></div>
    <div class="sum-card green"><div class="num">${ok}</div><div class="lbl">適正</div></div>
  `;
}

function renderItems() {
  const grid = document.getElementById('itemsGrid');
  grid.innerHTML = '';
  items.forEach((item, i) => {
    const s = getStatus(item);
    const pct = Math.min(100, Math.round(item.stock / item.max * 100));
    const reorderPct = Math.round(item.reorder / item.max * 100);
    const barColor = item.stock <= item.reorder ? '#dc2626' : item.stock >= item.max ? '#d97706' : '#2563eb';
    const div = document.createElement('div');
    div.className = `item-card ${s.cardCls}`;
    div.innerHTML = `
      <div class="item-top">
        <span class="item-name">${item.name}</span>
        <span class="item-badge ${s.cls}">${s.label}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-labels">
          <span>0</span>
          <span>上限 ${item.max}</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct}%;background:${barColor};"></div>
          <div class="progress-marker" style="left:${reorderPct}%;">
            <span class="progress-marker-label">発注点${item.reorder}</span>
          </div>
        </div>
      </div>
      <div class="item-bottom">
        <div class="item-stock-info">現在庫：<strong>${item.stock}</strong> 個</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="number" class="stock-direct" min="0" value="${item.stock}" onchange="directEdit(${i},this.value)" title="在庫数を直接入力" />
          <div class="item-actions">
            <button class="btn btn-success btn-sm" onclick="openIn(${i})">入荷</button>
            <button class="btn btn-warning btn-sm" onclick="openOut(${i})">出庫</button>
            <button class="btn btn-sm" onclick="openEdit(${i})">設定</button>
            <button class="btn-ghost btn btn-sm" onclick="deleteItem(${i})">削除</button>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(div);
  });
}

function renderChart() {
  const colors = items.map(item => {
    if (item.stock <= item.reorder) return 'rgba(220,38,38,0.8)';
    if (item.stock >= item.max) return 'rgba(217,119,6,0.8)';
    return 'rgba(37,99,235,0.8)';
  });
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    data: {
      labels: items.map(i => i.name),
      datasets: [
        { type:'bar', data: items.map(i => i.stock), backgroundColor: colors, borderRadius: 4, borderSkipped: false },
        { type:'line', data: items.map(i => i.reorder), borderColor:'#dc2626', borderWidth:2, borderDash:[4,4], pointRadius:3, pointBackgroundColor:'#dc2626', tension:0 },
        { type:'line', data: items.map(i => i.max), borderColor:'#d97706', borderWidth:2, borderDash:[4,4], pointRadius:3, pointBackgroundColor:'#d97706', tension:0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { autoSkip: false, font: { size: 11 }, maxRotation: 30 }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, callback: v => v }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });
}

function render() { renderAlert(); renderSummary(); renderItems(); renderChart(); }

// MODALS
function directEdit(i, val) {
  const old = items[i].stock;
  items[i].stock = Math.max(0, parseInt(val) || 0);
  if (old !== items[i].stock) { toast(`✏️ ${items[i].name} を ${items[i].stock}個 に変更`); renderAlert(); renderSummary(); renderChart(); }
}

function openEdit(i) {
  editTarget = i;
  document.getElementById('editTitle').textContent = `「${items[i].name}」の設定`;
  document.getElementById('editName').value = items[i].name;
  document.getElementById('editStock').value = items[i].stock;
  document.getElementById('editReorder').value = items[i].reorder;
  document.getElementById('editMax').value = items[i].max;
  document.getElementById('editModal').classList.add('open');
}
function confirmEdit() {
  const name = document.getElementById('editName').value.trim();
  if (!name) return alert('品目名を入力してください');
  if (editTarget >= 0) {
    items[editTarget] = {
      name,
      stock: parseInt(document.getElementById('editStock').value) || 0,
      reorder: parseInt(document.getElementById('editReorder').value) || 0,
      max: parseInt(document.getElementById('editMax').value) || 0
    };
    toast(`💾 「${name}」の設定を保存しました`);
    render();
  }
  closeModal('editModal');
}

function openIn(i) { inTarget=i; document.getElementById('inTitle').textContent=`「${items[i].name}」の入荷数`; document.getElementById('inQty').value=50; document.getElementById('inModal').classList.add('open'); }
function openOut(i) { outTarget=i; document.getElementById('outTitle').textContent=`「${items[i].name}」の出庫数`; document.getElementById('outQty').value=10; document.getElementById('outModal').classList.add('open'); }
function openAdd() { document.getElementById('addName').value=''; document.getElementById('addStock').value=100; document.getElementById('addReorder').value=30; document.getElementById('addMax').value=200; document.getElementById('addModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); inTarget=-1; outTarget=-1; editTarget=-1; }

function confirmIn() {
  const val=parseInt(document.getElementById('inQty').value)||0;
  if (inTarget>=0&&val>0) { items[inTarget].stock+=val; toast(`✅ ${items[inTarget].name} を ${val}個 入荷しました`); render(); }
  closeModal('inModal');
}
function confirmOut() {
  const val=parseInt(document.getElementById('outQty').value)||0;
  if (outTarget>=0&&val>0) { items[outTarget].stock=Math.max(0,items[outTarget].stock-val); toast(`📦 ${items[outTarget].name} を ${val}個 出庫しました`); render(); }
  closeModal('outModal');
}
function confirmAdd() {
  const name=document.getElementById('addName').value.trim();
  if (!name) return alert('品目名を入力してください');
  items.push({name,stock:parseInt(document.getElementById('addStock').value)||0,reorder:parseInt(document.getElementById('addReorder').value)||0,max:parseInt(document.getElementById('addMax').value)||0});
  toast(`➕ 「${name}」を追加しました`);
  closeModal('addModal'); render();
}
function deleteItem(i) {
  if (items.length<=1) return alert('最低1品目必要です');
  if (confirm(`「${items[i].name}」を削除しますか？`)) { const name=items[i].name; items.splice(i,1); toast(`🗑 「${name}」を削除しました`); render(); }
}

// INDUSTRY
function switchIndustry(key, btn) {
  items=JSON.parse(JSON.stringify(industryData[key].items));
  document.querySelectorAll('.ind-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  toast(`業種を切り替えました`);
  render();
}

// QUICK ACTIONS
function quickAction(type) {
  if (type==='low') {
    const need=items.filter(i=>i.stock<=i.reorder);
    const list=document.getElementById('orderList');
    if (!need.length) { list.innerHTML='<p style="color:var(--success);padding:8px 0;font-size:14px;">現在、発注が必要な品目はありません！</p>'; }
    else { list.innerHTML=need.map(i=>`<div style="padding:12px 0;border-bottom:1px solid var(--border);"><div style="font-weight:700;font-size:15px;margin-bottom:4px;">${i.name}</div><div style="font-size:13px;color:var(--danger);">現在庫 ${i.stock}個 ／ 発注点 ${i.reorder}個 ／ 推奨発注量 ${i.max-i.stock}個</div></div>`).join('')+`<p style="font-size:12px;color:var(--muted);margin-top:12px;">発注点を下回っている品目です</p>`; }
    document.getElementById('orderModal').classList.add('open');
  }
  else if (type==='order') {
    quickAction('low');
  }
  else if (type==='optimal') {
    items.forEach(i=>{ i.stock=Math.floor((i.reorder+i.max)/2); });
    toast('✅ 全品目を適正在庫に設定しました');
    render();
  }
  else if (type==='reset') {
    if (confirm('データをリセットしますか？')) { items=JSON.parse(JSON.stringify(industryData.manufacturing.items)); document.querySelectorAll('.ind-btn').forEach((b,i)=>b.classList.toggle('active',i===0)); toast('🔄 リセットしました'); render(); }
  }
}

// 背景クリックで閉じる
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click', e=>{ if(e.target===o) o.classList.remove('open'); });
});

render();
</script>
</body>
</html>
