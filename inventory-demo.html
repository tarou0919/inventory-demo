<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫管理デモシステム | りょうま@AI活用</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f7f5f0;
  --ink: #141210;
  --accent: #2563eb;
  --success: #059669;
  --warning: #d97706;
  --danger: #dc2626;
  --muted: #6b7280;
  --border: #e5e7eb;
  --card: #ffffff;
  --success-bg: #dcfce7;
  --warning-bg: #fef3c7;
  --danger-bg: #fee2e2;
  --success-text: #065f46;
  --warning-text: #92400e;
  --danger-text: #991b1b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; line-height: 1.6; }

/* HEADER */
.site-header {
  background: var(--ink);
  color: #fff;
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.site-title { font-size: 16px; font-weight: 500; }
.site-title span { color: #60a5fa; }
.back-link {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  letter-spacing: 0.1em;
  transition: color 0.2s;
}
.back-link:hover { color: #fff; }

/* HERO */
.hero {
  background: var(--accent);
  color: #fff;
  padding: 40px 32px;
  text-align: center;
}
.hero h1 { font-size: clamp(22px, 4vw, 36px); font-weight: 700; margin-bottom: 8px; }
.hero p { font-size: 15px; color: rgba(255,255,255,0.8); }
.demo-badge {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 4px 12px;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}

/* MAIN */
.main { max-width: 1000px; margin: 0 auto; padding: 32px 24px 80px; }

/* SUMMARY */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.summary-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.summary-card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.summary-card .value { font-size: 24px; font-weight: 700; }
.summary-card.danger { background: var(--danger-bg); border-color: #fca5a5; }
.summary-card.danger .label { color: var(--danger-text); }
.summary-card.danger .value { color: var(--danger); }
.summary-card.warning { background: var(--warning-bg); border-color: #fcd34d; }
.summary-card.warning .label { color: var(--warning-text); }
.summary-card.warning .value { color: var(--warning); }
.summary-card.success { background: var(--success-bg); border-color: #6ee7b7; }
.summary-card.success .label { color: var(--success-text); }
.summary-card.success .value { color: var(--success); }

/* TOOLBAR */
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.toolbar-title { font-size: 15px; font-weight: 500; }
.btn {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 8px 18px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--ink);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4ed8; }
.btn-success { background: var(--success-bg); color: var(--success-text); border-color: #6ee7b7; }
.btn-danger { background: var(--danger-bg); color: var(--danger-text); border-color: #fca5a5; }

/* TABLE */
.table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 24px;
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
thead tr { background: #f9fafb; }
th { padding: 10px 14px; text-align: left; font-weight: 500; color: var(--muted); font-size: 12px; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9fafb; }

.status-badge {
  display: inline-block;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 100px;
  font-weight: 500;
}
.status-badge.danger { background: var(--danger-bg); color: var(--danger-text); }
.status-badge.warning { background: var(--warning-bg); color: var(--warning-text); }
.status-badge.success { background: var(--success-bg); color: var(--success-text); }

input[type="number"].stock-input {
  width: 72px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  text-align: center;
  font-family: 'Space Mono', monospace;
}
input[type="number"].stock-input:focus { outline: none; border-color: var(--accent); }

/* CHART */
.chart-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 24px;
}
.chart-legend {
  display: flex;
  gap: 16px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.chart-container { position: relative; height: 280px; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border-radius: 12px;
  padding: 28px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
.modal label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
.modal input[type="text"],
.modal input[type="number"] {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  margin-bottom: 12px;
}
.modal input:focus { outline: none; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 4px; }
.modal-btns .btn { flex: 1; text-align: center; }

/* FOOTER */
footer {
  background: var(--ink);
  color: #aaa;
  padding: 32px 24px;
  text-align: center;
  font-size: 13px;
}
footer a { color: #60a5fa; text-decoration: none; }
footer .copy { margin-top: 8px; font-size: 12px; color: #555; }

@media (max-width: 600px) {
  .site-header, .hero, .main { padding-left: 16px; padding-right: 16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="site-title">りょうま<span>@AI活用</span> — 在庫管理デモ</div>
  <a href="ai_fukugyou_article.html" class="back-link">← メイン記事に戻る</a>
</header>

<!-- HERO -->
<div class="hero">
  <div class="demo-badge">INTERACTIVE DEMO</div>
  <h1>在庫管理システム</h1>
  <p>在庫数の変更・入荷・品目追加がリアルタイムで反映されます</p>
</div>

<!-- MAIN -->
<main class="main">

  <!-- サマリー -->
  <div class="summary-grid" id="summary"></div>

  <!-- テーブル -->
  <div class="toolbar">
    <span class="toolbar-title">品目一覧</span>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 品目を追加</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>品目名</th>
          <th>現在庫数</th>
          <th>発注点</th>
          <th>上限在庫</th>
          <th>状態</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="itemTable"></tbody>
    </table>
  </div>

  <!-- グラフ -->
  <div class="chart-wrap">
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#378ADD;"></div>現在庫数</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E24B4A;"></div>発注点</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF9F27;"></div>上限在庫</div>
    </div>
    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- 注記 -->
  <p style="font-size:12px;color:var(--muted);text-align:center;">
    ※ 架空のサンプルデータです。実際のデータに差し替えて活用できます。<br>
    ご依頼・お問い合わせは <a href="https://x.com/AI3488276633404" target="_blank" style="color:var(--accent);">X @AI3488276633404</a> まで
  </p>

</main>

<!-- 入荷モーダル -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <h3 id="orderModalTitle">入荷数を入力</h3>
    <label>入荷数</label>
    <input type="number" id="orderInput" min="1" max="999" value="50" />
    <div class="modal-btns">
      <button class="btn" onclick="closeOrderModal()">キャンセル</button>
      <button class="btn btn-success" onclick="confirmOrder()">入荷する</button>
    </div>
  </div>
</div>

<!-- 品目追加モーダル -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>品目を追加</h3>
    <label>品目名</label>
    <input type="text" id="newName" placeholder="例：部品C" />
    <label>現在庫数</label>
    <input type="number" id="newStock" min="0" value="100" />
    <label>発注点（この数値を下回ると警告）</label>
    <input type="number" id="newReorder" min="0" value="30" />
    <label>上限在庫（この数値を超えると警告）</label>
    <input type="number" id="newMax" min="0" value="200" />
    <div class="modal-btns">
      <button class="btn" onclick="closeAddModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmAdd()">追加する</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div>
    <a href="https://x.com/AI3488276633404" target="_blank">X @AI3488276633404</a>
    　|　
    <a href="ai_fukugyou_article.html">AI副業マガジン</a>
  </div>
  <div class="copy">© 2026 りょうま / AI副業マガジン. All rights reserved.</div>
</footer>

<script>
let items = [
  { name: '部品A', stock: 45, reorder: 50, max: 200 },
  { name: '部品B', stock: 180, reorder: 40, max: 150 },
  { name: '部品C', stock: 95, reorder: 30, max: 180 },
  { name: '部品D', stock: 20, reorder: 60, max: 160 },
  { name: '資材E', stock: 210, reorder: 50, max: 180 },
  { name: '資材F', stock: 75, reorder: 40, max: 160 },
];

let chart = null;
let orderTarget = -1;

const getStatus = item => {
  if (item.stock <= item.reorder) return { label: '要発注', cls: 'danger' };
  if (item.stock >= item.max) return { label: '過剰在庫', cls: 'warning' };
  return { label: '適正', cls: 'success' };
};

function renderSummary() {
  const danger = items.filter(i => i.stock <= i.reorder).length;
  const over = items.filter(i => i.stock >= i.max).length;
  const ok = items.filter(i => i.stock > i.reorder && i.stock < i.max).length;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="label">管理品目数</div>
      <div class="value">${items.length}品目</div>
    </div>
    <div class="summary-card danger">
      <div class="label">要発注</div>
      <div class="value">${danger}品目</div>
    </div>
    <div class="summary-card warning">
      <div class="label">過剰在庫</div>
      <div class="value">${over}品目</div>
    </div>
    <div class="summary-card success">
      <div class="label">適正在庫</div>
      <div class="value">${ok}品目</div>
    </div>
  `;
}

function renderTable() {
  const tbody = document.getElementById('itemTable');
  tbody.innerHTML = '';
  items.forEach((item, i) => {
    const s = getStatus(item);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:500;">${item.name}</td>
      <td>
        <input type="number" class="stock-input" min="0" max="999" value="${item.stock}" step="1"
          onchange="updateStock(${i}, this.value)" />
      </td>
      <td style="color:var(--muted);">${item.reorder}個</td>
      <td style="color:var(--muted);">${item.max}個</td>
      <td><span class="status-badge ${s.cls}">${s.label}</span></td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-success" style="padding:4px 12px;font-size:12px;" onclick="openOrderModal(${i})">入荷</button>
          <button class="btn btn-danger" style="padding:4px 12px;font-size:12px;" onclick="removeItem(${i})">削除</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function renderChart() {
  const colors = items.map(item => {
    if (item.stock <= item.reorder) return 'rgba(220,38,38,0.75)';
    if (item.stock >= item.max) return 'rgba(217,119,6,0.75)';
    return 'rgba(37,99,235,0.75)';
  });
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    data: {
      labels: items.map(i => i.name),
      datasets: [
        { type:'bar', label:'現在庫', data: items.map(i => i.stock), backgroundColor: colors, borderWidth: 1 },
        { type:'line', label:'発注点', data: items.map(i => i.reorder), borderColor:'#E24B4A', borderWidth:2, borderDash:[5,5], pointRadius:4, pointBackgroundColor:'#E24B4A', tension:0 },
        { type:'line', label:'上限', data: items.map(i => i.max), borderColor:'#EF9F27', borderWidth:2, borderDash:[5,5], pointRadius:4, pointBackgroundColor:'#EF9F27', tension:0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { autoSkip: false, font: { size: 12 } }, grid: { color: 'rgba(0,0,0,0.05)' } },
        y: { ticks: { font: { size: 12 }, callback: v => v + '個' }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });
}

function render() { renderSummary(); renderTable(); renderChart(); }

function updateStock(i, val) {
  items[i].stock = Math.max(0, parseInt(val) || 0);
  render();
}

function removeItem(i) {
  if (items.length <= 1) return alert('最低1品目は必要です');
  if (confirm(`「${items[i].name}」を削除しますか？`)) {
    items.splice(i, 1);
    render();
  }
}

function openOrderModal(i) {
  orderTarget = i;
  document.getElementById('orderModalTitle').textContent = `「${items[i].name}」の入荷数を入力`;
  document.getElementById('orderInput').value = 50;
  document.getElementById('orderModal').classList.add('open');
}

function closeOrderModal() {
  document.getElementById('orderModal').classList.remove('open');
  orderTarget = -1;
}

function confirmOrder() {
  const val = parseInt(document.getElementById('orderInput').value) || 0;
  if (orderTarget >= 0 && val > 0) {
    items[orderTarget].stock = Math.min(items[orderTarget].stock + val, 999);
    render();
  }
  closeOrderModal();
}

function openAddModal() {
  document.getElementById('newName').value = '';
  document.getElementById('newStock').value = 100;
  document.getElementById('newReorder').value = 30;
  document.getElementById('newMax').value = 200;
  document.getElementById('addModal').classList.add('open');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

function confirmAdd() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return alert('品目名を入力してください');
  items.push({
    name,
    stock: parseInt(document.getElementById('newStock').value) || 0,
    reorder: parseInt(document.getElementById('newReorder').value) || 0,
    max: parseInt(document.getElementById('newMax').value) || 0
  });
  closeAddModal();
  render();
}

render();
</script>
</body>
</html>
